name: Flood Guard Pipeline

# Runs the weather fetcher + flood prediction job twice a day.
# See docs/operations.md for the intended cadence and why this exists.
#
# 03:00 and 15:00 UTC = 06:00 and 18:00 EAT (Kampala local time).
on:
  schedule:
    - cron: "0 3,15 * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python run_pipeline.py
